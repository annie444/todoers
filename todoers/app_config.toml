# Base URL of the todoers server. Override in your own config.toml if needed.
server_url = "http://127.0.0.1:8192"

# Password-less device unlock. Opt in per-device by setting these in your own
# config.toml. After one normal password login this device seals its keys to
# `recipient` and enrolls a trusted key with the server; later launches unlock
# with `identity` and no password. Security note: the protection is only as
# strong as the local key — prefer an agent/passphrase/hardware-backed key over a
# plaintext identity file sitting next to the cache.
#
# [device_unlock]
# enabled = true
# backend = "age"                          # "age" or "ssh"
# recipient = "age1ql3z7hjy54pw3hyww5ayyfg7zqgvc7w3j2elw8zmrj2kg5sfn9aqmcac8p"
# identity = "/home/you/.config/todoers/age-identity.txt"

[keybindings.home]
q = "quit"
"?" = "help_modal"
ctrl-l = "login_modal"
ctrl-r = "register_modal"
ctrl-d = "quit"
ctrl-c = "quit"
ctrl-z = "suspend"
"space+e" = "toggle_sidebar"

[keybindings.register]
"?" = "help_modal"
ctrl-l = "login_modal"
ctrl-d = "quit"
ctrl-c = "quit"
ctrl-z = "suspend"
esc = "stop_capture"

[keybindings.login]
"?" = "help_modal"
ctrl-r = "register_modal"
ctrl-d = "quit"
ctrl-c = "quit"
ctrl-z = "suspend"
esc = "stop_capture"
